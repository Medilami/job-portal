<!DOCTYPE html>
<html>
<head>
    <title>Employer Dashboard - JobPortal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f7fb;
            color: #1a2a3a;
            line-height: 1.5;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 32px;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1e4a76;
        }

        .logo span {
            color: #2c3e50;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #4a5568;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
        }

        .nav-links a:hover {
            background: #eef2ff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .hero {
            background: linear-gradient(105deg, #e8f0fe 0%, #dce7f5 100%);
            border-radius: 24px;
            padding: 28px 32px;
            margin-bottom: 32px;
        }

        .hero h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-box {
            background: white;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #eef2f6;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #1e4a76;
        }

        .stat-label {
            font-size: 13px;
            color: #5b6e8c;
            margin-top: 8px;
        }

        .applicant-card {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 16px;
            border: 1px solid #eef2f6;
            border-left: 4px solid #1e4a76;
        }

        .job-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .applicant-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 10px 0;
            font-size: 13px;
            color: #5b6e8c;
        }

        .status-select {
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 13px;
            margin-left: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            .header { padding: 12px 20px; }
            .container { padding: 20px; }
            .hero { padding: 20px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">Job<span>Portal</span></div>
        <div class="nav-links">
            <a href="jobs.html">Jobs</a>
            <a href="job-post.html">Post Job</a>
            <a href="manage-jobs.html">Manage Jobs</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()" style="color:#c62828;">Logout</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="hero">
        <h1>🏢 Employer Dashboard</h1>
        <p>Review applicants and manage your job postings</p>
    </div>

    <div id="stats" class="stats-grid"></div>
    <h3 style="margin-bottom: 16px;">📋 Recent applicants</h3>
    <div id="applicants"></div>
</div>

<script>
    const API_BASE = 'https://job-portal-production-e674.up.railway.app';
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');

    if (!token) {
        window.location.href = 'login.html';
    }

    const user = JSON.parse(userStr);
    if (user.role !== 'employer') {
        document.getElementById('applicants').innerHTML = '<div class="empty-state"><h3>⚠️ Access Denied</h3><p>This page is for employers only.</p></div>';
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    async function updateStatus(applicationId, selectElement) {
        const newStatus = selectElement.value;
        try {
            const res = await fetch(`${API_BASE}/applications/${applicationId}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: newStatus })
            });
            const result = await res.json();
            alert(result.message);
        } catch (err) {
            alert('Error updating status');
        }
    }

    async function loadDashboard() {
        try {
            const res = await fetch(`${API_BASE}/employer/applicants`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (data.success && data.applicants && data.applicants.length > 0) {
                const uniqueJobs = new Set();
                data.applicants.forEach(a => uniqueJobs.add(a.job_title));
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-box">
                        <div class="stat-number">${uniqueJobs.size}</div>
                        <div class="stat-label">Active Jobs</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.applicants.length}</div>
                        <div class="stat-label">Total Applicants</div>
                    </div>
                `;

                let html = '';
                for (const app of data.applicants) {
                    html += `
                        <div class="applicant-card">
                            <div class="job-title">${escapeHtml(app.job_title)}</div>
                            <div class="applicant-meta">
                                <span>👤 ${escapeHtml(app.seeker_name)}</span>
                                <span>📧 ${escapeHtml(app.seeker_email)}</span>
                                <span>📅 Applied: ${new Date(app.applied_at).toLocaleDateString()}</span>
                            </div>
                            <div style="margin: 10px 0; background: #f8fafc; padding: 10px; border-radius: 12px;">
                                <strong>Cover letter:</strong> "${escapeHtml(app.cover_letter || 'No cover letter')}"
                            </div>
                            <div>
                                <label>Update status:</label>
                                <select class="status-select" onchange="updateStatus(${app.id}, this)">
                                    <option value="pending" ${app.status === 'pending' ? 'selected' : ''}>Pending</option>
                                    <option value="reviewed" ${app.status === 'reviewed' ? 'selected' : ''}>Reviewed</option>
                                    <option value="accepted" ${app.status === 'accepted' ? 'selected' : ''}>Accepted</option>
                                    <option value="rejected" ${app.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                                </select>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('applicants').innerHTML = html;
            } else {
                document.getElementById('stats').innerHTML = '';
                document.getElementById('applicants').innerHTML = '<div class="empty-state"><h3>📭 No applicants yet</h3><p>When job seekers apply, they will appear here.</p></div>';
            }
        } catch (err) {
            document.getElementById('applicants').innerHTML = '<div class="empty-state"><h3>❌ Error loading data</h3><p>Make sure the server is running.</p></div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadDashboard();
</script>
</body>
</html>
