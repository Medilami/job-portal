<!DOCTYPE html>
<html>
<head>
    <title>Employer Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f7fb; }
        .header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: 700; color: #1e4a76; }
        .nav a { margin-left: 20px; text-decoration: none; color: #4a5568; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .applicant-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; border-left: 4px solid #1e4a76; }
        .stat-box { background: white; padding: 20px; border-radius: 16px; text-align: center; display: inline-block; width: 200px; margin-right: 20px; }
        .stat-number { font-size: 32px; font-weight: bold; color: #1e4a76; }
        select { padding: 6px 12px; border-radius: 20px; margin-left: 10px; }
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">JobPortal</div>
        <div class="nav">
            <a href="jobs.html">Jobs</a>
            <a href="job-post.html">Post Job</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
    <div class="container">
        <h2>Employer Dashboard</h2>
        <div id="stats"></div>
        <div id="applicants"></div>
    </div>

    <script>
        const API_BASE = 'https://job-portal-production-e674.up.railway.app';
        const token = localStorage.getItem('token');
        
        if (!token) window.location.href = 'login.html';
        
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        
        async function updateStatus(appId, select) {
            await fetch(`${API_BASE}/applications/${appId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ status: select.value })
            });
            alert('Status updated');
            location.reload();
        }
        
        async function loadDashboard() {
            const res = await fetch(`${API_BASE}/employer/applicants`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            if (data.success && data.applicants && data.applicants.length > 0) {
                const uniqueJobs = new Set(data.applicants.map(a => a.job_title));
                document.getElementById('stats').innerHTML = `
                    <div class="stat-box"><div class="stat-number">${uniqueJobs.size}</div><div>Active Jobs</div></div>
                    <div class="stat-box"><div class="stat-number">${data.applicants.length}</div><div>Total Applicants</div></div>
                `;
                let html = '';
                for (const app of data.applicants) {
                    html += `
                        <div class="applicant-card">
                            <h3>${app.job_title}</h3>
                            <p>👤 ${app.seeker_name} (${app.seeker_email})</p>
                            <p>📅 Applied: ${new Date(app.applied_at).toLocaleDateString()}</p>
                            <p><strong>Cover letter:</strong> "${app.cover_letter || 'No cover letter'}"</p>
                            <p>Status: 
                                <select onchange="updateStatus(${app.id}, this)">
                                    <option ${app.status === 'pending' ? 'selected' : ''}>pending</option>
                                    <option ${app.status === 'reviewed' ? 'selected' : ''}>reviewed</option>
                                    <option ${app.status === 'accepted' ? 'selected' : ''}>accepted</option>
                                    <option ${app.status === 'rejected' ? 'selected' : ''}>rejected</option>
                                </select>
                            </p>
                        </div>
                    `;
                }
                document.getElementById('applicants').innerHTML = html;
            } else {
                document.getElementById('stats').innerHTML = '';
                document.getElementById('applicants').innerHTML = '<div class="empty-state"><h3>No applicants yet</h3></div>';
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
