<!DOCTYPE html>
<html>
<head>
    <title>Apply for Job - JobPortal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f7fb;
            color: #1a2a3a;
            line-height: 1.5;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 32px;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1e4a76;
        }

        .logo span {
            color: #2c3e50;
        }

        .nav-links a {
            color: #4a5568;
            text-decoration: none;
            padding: 8px 16px;
            font-size: 14px;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #eef2f6;
        }

        .card h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .job-info {
            background: #e8f0fe;
            padding: 16px;
            border-radius: 16px;
            margin: 20px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #1e4a76;
            box-shadow: 0 0 0 3px rgba(30,74,118,0.1);
        }

        .btn {
            width: 100%;
            background: #1e4a76;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: #143b5c;
        }

        .alert-success {
            background: #e6f7e6;
            border-left: 4px solid #2e7d32;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #fee2e2;
            border-left: 4px solid #c62828;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #1e4a76;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">Job<span>Portal</span></div>
        <div class="nav-links">
            <a href="jobs.html">Jobs</a>
            <a href="my-applications.html">My Apps</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <h2>Submit application</h2>
        <div id="jobInfo" class="job-info"></div>
        <div id="message"></div>
        <form id="applyForm">
            <div class="form-group">
                <label>Cover letter</label>
                <textarea id="cover_letter" rows="6" placeholder="Tell us why you're a good fit for this role..."></textarea>
            </div>
            <button type="submit" class="btn">Submit application</button>
        </form>
        <a href="jobs.html" class="back-link">← Back to jobs</a>
    </div>
</div>

<script>
    const API_BASE = 'https://job-portal-production-e674.up.railway.app';
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');

    if (!token) {
        window.location.href = 'login.html';
    }

    const user = JSON.parse(userStr);
    if (user.role !== 'jobseeker') {
        document.getElementById('jobInfo').innerHTML = '<p style="color:#c62828;">⚠️ Only job seekers can apply for jobs.</p>';
        document.getElementById('applyForm').style.display = 'none';
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // Get job ID from URL
    const url = window.location.href;
    let jobId = url.split('?job_id=')[1];
    if (jobId && jobId.includes('&')) {
        jobId = jobId.split('&')[0];
    }

    if (!jobId) {
        document.getElementById('jobInfo').innerHTML = '<p style="color:#c62828;">❌ No job selected. Please go back and click "Apply" on a job.</p>';
        document.getElementById('applyForm').style.display = 'none';
    } else {
        document.getElementById('jobInfo').innerHTML = `
            <p>✅ Applying for Job ID: <strong>${jobId}</strong></p>
            <p><strong>Applying as:</strong> ${user.full_name} (${user.email})</p>
            <p style="font-size:13px; margin-top:8px;">Please write a cover letter explaining why you're a good candidate.</p>
        `;
    }

    const form = document.getElementById('applyForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const coverLetter = document.getElementById('cover_letter').value;

        if (!coverLetter.trim()) {
            document.getElementById('message').innerHTML = '<div class="alert-error">⚠️ Please write a cover letter.</div>';
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/apply`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    job_id: parseInt(jobId),
                    cover_letter: coverLetter
                })
            });
            const result = await res.json();

            if (result.success) {
                document.getElementById('message').innerHTML = `<div class="alert-success">✅ ${result.message}</div>`;
                document.getElementById('applyForm').reset();
            } else {
                document.getElementById('message').innerHTML = `<div class="alert-error">❌ ${result.message}</div>`;
            }
        } catch (err) {
            document.getElementById('message').innerHTML = '<div class="alert-error">❌ Server error. Make sure backend is running.</div>';
        }
    });
</script>
</body>
</html>
