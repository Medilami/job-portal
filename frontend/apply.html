<!DOCTYPE html>
<html>
<head>
    <title>Apply for Job</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f7fb; }
        .header { background: white; padding: 16px 32px; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 22px; font-weight: 700; color: #1e4a76; }
        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; border-radius: 20px; padding: 32px; }
        .job-info { background: #e8f0fe; padding: 16px; border-radius: 16px; margin: 20px 0; }
        textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; }
        .btn { background: #1e4a76; color: white; padding: 12px; border: none; border-radius: 40px; width: 100%; cursor: pointer; }
        .alert-success { background: #e6f7e6; padding: 14px; border-radius: 12px; margin: 10px 0; }
        .alert-error { background: #fee2e2; padding: 14px; border-radius: 12px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header"><div class="logo">JobPortal</div></div>
    <div class="container">
        <div class="card">
            <h2>Submit Application</h2>
            <div id="jobInfo" class="job-info"></div>
            <div id="message"></div>
            <form id="applyForm">
                <textarea id="cover_letter" rows="5" placeholder="Write your cover letter..."></textarea><br><br>
                <button type="submit" class="btn">Submit Application</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'https://job-portal-production-e674.up.railway.app';
        const token = localStorage.getItem('token');
        
        if (!token) window.location.href = 'login.html';
        
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('job_id');
        
        if (!jobId) {
            document.getElementById('jobInfo').innerHTML = '<p style="color:red;">No job selected. Go back.</p>';
            document.getElementById('applyForm').style.display = 'none';
        } else {
            document.getElementById('jobInfo').innerHTML = `<p>Applying for Job ID: ${jobId}</p>`;
        }
        
        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const coverLetter = document.getElementById('cover_letter').value;
            
            const res = await fetch(`${API_BASE}/apply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ job_id: parseInt(jobId), cover_letter: coverLetter })
            });
            const result = await res.json();
            document.getElementById('message').innerHTML = result.success ? 
                `<div class="alert-success">✅ ${result.message}</div>` : 
                `<div class="alert-error">❌ ${result.message}</div>`;
        });
    </script>
</body>
</html>
