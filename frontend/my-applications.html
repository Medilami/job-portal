<!DOCTYPE html>
<html>
<head>
    <title>My Applications</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f7fb; }
        .header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: 700; color: #1e4a76; }
        .nav a { margin-left: 20px; text-decoration: none; color: #4a5568; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .app-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; border-left: 4px solid #1e4a76; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        .status-pending { background: #fef3c7; color: #b45309; }
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 20px; }

@media (max-width: 768px) {
    .header-inner {
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }
    
    .nav-links {
        justify-content: center;
    }
    
    .container {
        padding: 20px 15px;
    }
    
    .hero {
        padding: 20px;
    }
    
    .hero h1 {
        font-size: 24px;
    }
    
    .search-row {
        flex-direction: column;
    }
    
    .search-field {
        width: 100%;
    }
    
    .btn {
        width: 100%;
        text-align: center;
    }
    
    .job-card {
        padding: 16px;
    }
    
    .job-title {
        font-size: 18px;
    }
    
    .job-meta {
        flex-direction: column;
        gap: 8px;
    }
    
    .stats-grid {
        grid-template-columns: 1fr;
    }
    
    .card {
        padding: 20px;
    }
    
    .profile-header {
        flex-direction: column;
        text-align: center;
    }
}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">JobPortal</div>
        <div class="nav">
            <a href="jobs.html">Jobs</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
    <div class="container">
        <h2>My Applications</h2>
        <div id="applications"></div>
    </div>

    <script>
        const API_BASE = 'https://job-portal-production-e674.up.railway.app';
        const token = localStorage.getItem('token');
        
        if (!token) window.location.href = 'login.html';
        
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        
        async function loadApplications() {
            const res = await fetch(`${API_BASE}/my-applications`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            if (data.success && data.applications && data.applications.length > 0) {
                let html = '';
                for (const app of data.applications) {
                    html += `
                        <div class="app-card">
                            <h3>${app.title}</h3>
                            <p> ${app.location}</p>
                            <p> Applied: ${new Date(app.applied_at).toLocaleDateString()}</p>
                            <p><span class="status status-${app.status}">${app.status}</span></p>
                            <p><strong>Cover letter:</strong> "${app.cover_letter || 'No cover letter'}"</p>
                        </div>
                    `;
                }
                document.getElementById('applications').innerHTML = html;
            } else {
                document.getElementById('applications').innerHTML = '<div class="empty-state"><h3>No applications yet</h3></div>';
            }
        }
        
        loadApplications();
    </script>
</body>
</html>
