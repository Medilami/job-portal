<!DOCTYPE html>
<html>
<head>
    <title>My Applications - JobPortal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f7fb;
            color: #1a2a3a;
            line-height: 1.5;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 32px;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1e4a76;
        }

        .logo span {
            color: #2c3e50;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #4a5568;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
        }

        .nav-links a:hover {
            background: #eef2ff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .hero {
            background: linear-gradient(105deg, #e8f0fe 0%, #dce7f5 100%);
            border-radius: 24px;
            padding: 28px 32px;
            margin-bottom: 32px;
        }

        .hero h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .app-card {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 16px;
            border: 1px solid #eef2f6;
            border-left: 4px solid #1e4a76;
        }

        .app-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .app-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 10px 0;
            font-size: 13px;
            color: #5b6e8c;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending { background: #fef3c7; color: #b45309; }
        .status-reviewed { background: #e0e7ff; color: #3730a3; }
        .status-accepted { background: #dcfce7; color: #15803d; }
        .status-rejected { background: #fee2e2; color: #b91c1c; }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
        }

        @media (max-width: 768px) {
            .header { padding: 12px 20px; }
            .container { padding: 20px; }
            .hero { padding: 20px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">Job<span>Portal</span></div>
        <div class="nav-links">
            <a href="jobs.html">Jobs</a>
            <a href="my-applications.html">My Apps</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()" style="color:#c62828;">Logout</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="hero">
        <h1>📋 My job applications</h1>
        <p>Track the status of jobs you've applied for</p>
    </div>

    <div id="applications"></div>
</div>

<script>
    const API_BASE = 'https://job-portal-production-e674.up.railway.app';
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');

    if (!token) {
        window.location.href = 'login.html';
    }

    const user = JSON.parse(userStr);

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    async function loadApplications() {
        try {
            const res = await fetch(`${API_BASE}/my-applications`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (data.success && data.applications && data.applications.length > 0) {
                let html = '';
                for (const app of data.applications) {
                    html += `
                        <div class="app-card">
                            <div class="app-title">${escapeHtml(app.title)}</div>
                            <div class="app-meta">
                                <span>📍 ${escapeHtml(app.location)}</span>
                                <span>📅 Applied: ${new Date(app.applied_at).toLocaleDateString()}</span>
                                <span>⏰ Deadline: ${new Date(app.deadline).toLocaleDateString()}</span>
                            </div>
                            <div><span class="status status-${app.status}">${app.status}</span></div>
                            <div style="margin-top: 12px; font-size: 13px; color: #475569;">
                                <strong>Your cover letter:</strong> "${escapeHtml(app.cover_letter || 'No cover letter provided')}"
                            </div>
                        </div>
                    `;
                }
                document.getElementById('applications').innerHTML = html;
            } else {
                document.getElementById('applications').innerHTML = `
                    <div class="empty-state">
                        <h3>📭 No applications yet</h3>
                        <p style="margin-top: 8px;"><a href="jobs.html">Browse jobs</a> and apply to your first position.</p>
                    </div>
                `;
            }
        } catch (err) {
            document.getElementById('applications').innerHTML = '<div class="empty-state"><h3>❌ Error loading applications</h3><p>Make sure the server is running.</p></div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadApplications();
</script>
</body>
</html>
