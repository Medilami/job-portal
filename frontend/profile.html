<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f7fb; }
        .header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: 700; color: #1e4a76; }
        .nav a { margin-left: 20px; text-decoration: none; color: #4a5568; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; border-radius: 20px; padding: 32px; }
        .avatar { width: 80px; height: 80px; background: #1e4a76; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: white; }
        .form-group { margin: 20px 0; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; }
        .btn { background: #1e4a76; color: white; padding: 12px 28px; border: none; border-radius: 40px; cursor: pointer; }

@media (max-width: 768px) {
    .header-inner {
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }
    
    .nav-links {
        justify-content: center;
    }
    
    .container {
        padding: 20px 15px;
    }
    
    .hero {
        padding: 20px;
    }
    
    .hero h1 {
        font-size: 24px;
    }
    
    .search-row {
        flex-direction: column;
    }
    
    .search-field {
        width: 100%;
    }
    
    .btn {
        width: 100%;
        text-align: center;
    }
    
    .job-card {
        padding: 16px;
    }
    
    .job-title {
        font-size: 18px;
    }
    
    .job-meta {
        flex-direction: column;
        gap: 8px;
    }
    
    .stats-grid {
        grid-template-columns: 1fr;
    }
    
    .card {
        padding: 20px;
    }
    
    .profile-header {
        flex-direction: column;
        text-align: center;
    }
}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">JobPortal</div>
        <div class="nav">
            <a href="jobs.html">Jobs</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <div id="profileContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://job-portal-production-e674.up.railway.app';
        const token = localStorage.getItem('token');
        
        if (!token) window.location.href = 'login.html';
        
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        
        async function loadProfile() {
            const res = await fetch(`${API_BASE}/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            if (data.success) {
                const user = data.user;
                document.getElementById('profileContent').innerHTML = `
                    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                        <div class="avatar">${user.full_name.charAt(0)}</div>
                        <div><h2>${user.full_name}</h2><p>${user.email}</p><p>${user.role === 'jobseeker' ? 'Job Seeker' : 'Employer'}</p></div>
                    </div>
                    <form onsubmit="updateProfile(event)">
                        <div class="form-group"><label>Full Name</label><input type="text" id="full_name" value="${user.full_name}"></div>
                        <button type="submit" class="btn">Save Changes</button>
                    </form>
                `;
            }
        }
        
        async function updateProfile(e) {
            e.preventDefault();
            const full_name = document.getElementById('full_name').value;
            await fetch(`${API_BASE}/profile`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ full_name })
            });
            alert('Profile updated!');
            location.reload();
        }
        
        loadProfile();
    </script>
</body>
</html>
